name = "4x8matrix/tui"
version = "0.1.0-dev.1"
license = "MIT"
# repository = "https://github.com/DiscordLuau/discord-luau"
description = "A TUI renderer for Luau"
authors = ["Async Matrix <hi@asyncmatrix.dev>"]

includes = ["src/**/*", "pesde.toml", "LICENSE", "readme.md"]

[target]
environment = "luau"
lib = "src/init.luau"

[indices]
default = "https://github.com/pesde-pkg/index"

[dev_dependencies]
frktest = { name = "itsfrank/frktest", version = "^0.0.2", target = "lune" }
